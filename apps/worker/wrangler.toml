name = "hvi-gateway"
main = "src/worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "SESSION", class_name = "HviSessionDO" },
  { name = "SNAPSHOT", class_name = "HviSnapshotDO" },
]

[[kv_namespaces]]
binding = "HVI_KV"
id = "993da56ebd17455e8a6b7af73584617d"

[[r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "hvi-snapshots"

# Nightly digest 12:00 UTC (7am Houston CDT); monthly Time Machine snapshot
# 08:00 UTC on the 1st (3am CDT).
[triggers]
crons = ["0 12 * * *", "0 8 1 * *"]

[vars]
VAPID_PUBLIC_KEY = "BJ0ILYK2NWtuqNjtL_mSiS5NpODBrvi2ebZST-cdZkIoQtKV4tenpy5zkqcwU6p1yG4c5A4kgqBXWrM7-2lL9hA"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HviSessionDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["HviSnapshotDO"]
